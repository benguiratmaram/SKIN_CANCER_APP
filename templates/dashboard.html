<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4fbff;
    font-family: "Segoe UI";
}

/* NAVBAR */
.navbar {
    background: linear-gradient(135deg, #2a9df4, #1b4f72);
}

/* LOGO */
.logo {
    width: 40px;
    border-radius: 50%;
    margin-right: 10px;
}

/* CARD */
.card-box {
    border-radius: 15px;
    padding: 20px;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* DARK MODE */
.dark-mode {
    background-color: #121212;
    color: white;
}

.dark-mode .card-box {
    background: #1e1e1e;
}

.dark-mode .navbar {
    background: black !important;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-3">
    <div class="d-flex align-items-center">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <span class="navbar-brand">Skin Cancer AI</span>
    </div>

    <div>
        <button onclick="toggleTheme()" class="btn btn-light btn-sm">🌙</button>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

    <h3 class="mb-4">Medical Dashboard</h3>

    <div class="row g-4">

        <!-- ANALYSE -->
        <div class="col-md-4">
            <div class="card-box text-center">
                <h5>🧬 Analyse</h5>
                <p>Upload image for AI detection</p>
                <a href="/predict" class="btn btn-primary w-100">Start</a>
            </div>
        </div>

        <!-- PATIENTS -->
        <div class="col-md-4">
            <div class="card-box text-center">
                <h5>🧑‍⚕️ Patients</h5>
                <p>View patient history</p>
                <a href="/patients" class="btn btn-info w-100">View</a>
            </div>
        </div>

        <!-- STATUS -->
        <div class="col-md-4">
            <div class="card-box text-center">
                <h5>🏥 System</h5>
                <p>AI Model Status</p>
                <button class="btn btn-success w-100">Online</button>
            </div>
        </div>

    </div>

</div>

<!-- SCRIPT DARK MODE -->
<script>
function toggleTheme() {
    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

window.onload = function(){
    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark-mode");
    }
}
</script>

</body>
</html>
