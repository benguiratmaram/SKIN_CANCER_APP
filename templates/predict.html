<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skin Cancer AI - Analysis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4fbff;
    font-family: "Segoe UI", sans-serif;
}

/* CARD */
.card-box {
    max-width: 500px;
    margin: 60px auto;
    padding: 25px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE */
.title {
    font-weight: bold;
    color: #1b4f72;
}

/* INPUT */
.form-control {
    border-radius: 10px;
    margin-bottom: 12px;
}

/* BUTTON */
.btn-analyze {
    background: #2a9df4;
    color: white;
    border-radius: 10px;
    font-weight: 600;
}

/* IMAGE PREVIEW */
.preview {
    width: 100%;
    margin-top: 15px;
    border-radius: 15px;
    display: none;
}
</style>

</head>

<body>

<div class="card-box">

    <h3 class="title text-center mb-3">🧬 Analyse patient</h3>

    <!-- FLASH -->
    {% for cat,msg in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{cat}}">{{msg}}</div>
    {% endfor %}

    <!-- FORM -->
    <form method="POST" enctype="multipart/form-data" id="form">

        <input class="form-control" type="text" name="name" placeholder="Nom" required>
        <input class="form-control" type="number" name="age" placeholder="Age" required>

        <input class="form-control" type="file" name="image" id="fileInput" required>

        <!-- IMAGE PREVIEW -->
        <img id="preview" class="preview">

        <button type="submit" class="btn btn-analyze w-100 mt-3" id="btn">
            Analyser
        </button>

    </form>

    <!-- LOADER -->
    <div id="loader" class="text-center mt-3" style="display:none;">
        <div class="spinner-border text-primary"></div>
        <p>Analyse en cours...</p>
    </div>

    <!-- BACK -->
    <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-outline-secondary">⬅ Retour</a>
    </div>

</div>

<!-- SCRIPT -->
<script>

// IMAGE PREVIEW
document.getElementById("fileInput").addEventListener("change", function(event) {
    let file = event.target.files[0];
    if(file){
        let reader = new FileReader();
        reader.onload = function(e){
            let img = document.getElementById("preview");
            img.src = e.target.result;
            img.style.display = "block";
        }
        reader.readAsDataURL(file);
    }
});

// LOADING EFFECT
document.getElementById("form").addEventListener("submit", function() {
    document.getElementById("btn").style.display = "none";
    document.getElementById("loader").style.display = "block";
});

</script>

</body>
</html>
